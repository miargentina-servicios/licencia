<!DOCTYPE html>    
<html lang="es">    
<head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>LNC FRENTE</title>    

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    

<style>    

body {    
    font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;    
    background: linear-gradient(135deg, #e6e6e6, #f7f7f7);  
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    margin:0;    
}    

.btn-pdf{    
    position:absolute;    
    top:10px;    
    left:10px;    
    padding:8px 12px;    
    background:#4aa3df;    
    color:#fff;    
    border:none;    
    border-radius:5px;    
    cursor:pointer;    
}    

.carnet-container {  
    width:856px;  
    height:540px;  
    overflow:hidden;  
    display:flex;  
    flex-direction:column;  
    border-radius:14px;  
    border:1px solid rgba(0,0,0,0.15);  
    box-shadow:0 8px 25px rgba(0,0,0,0.18);  
    background:#fff;  
    transform-origin: top left;
}  

.header {    
    background: rgba(255,255,255,0.2);    
    backdrop-filter: blur(6px);    
    color:#008c8c;    
    display:flex;    
    align-items:center;    
    justify-content:space-between;    
    padding:4px 10px;  
    height:38px;    
    position:relative;  
}    

.header::after{  
    content:"";  
    position:absolute;  
    bottom:0;  
    left:15px;  
    right:15px;  
    height:3px;  
    background:#00a3ff;  
}  

.header-title {    
    font-size:15px;    
    font-weight:600;    
    text-align:center;    
    flex-grow:1;    
    line-height:1.05;    
    color:#0072bb;    
    letter-spacing:1px;    
    text-transform: uppercase;  
}    

.flag-icon { width:28px; }    
.shield-icon { width:22px; }    

.content {  
    display:grid;  
    grid-template-columns:120px 1fr;  
    padding:6px;  
    gap:6px;  
    flex:1;  
}  

.photo-placeholder {    
    width:115px;    
    height:135px;    
    background:#ffffff;    
    padding:4px;    
    border-radius:6px;    
    cursor:pointer;    
    overflow:hidden;    
    display:flex;    
    justify-content:center;    
    align-items:center;    
}    

.photo-placeholder img {    
    width:100%;    
    height:100%;    
    object-fit:cover;    
    display:none;    
    border-radius:3px;  
}    

.data {    
    font-size:10.5px;    
    color:#1a1a1a;  
    line-height:1.05;  
}    

.data b{  
    font-size:12.5px;    
    font-weight:600;  
    color:#000;  
}    

.item {    
    margin-bottom:6px;    
    display:flex;  
    gap:18px;  
}    

.label {    
    font-size:9.5px;    
    color:#333;  
}    

.item-dates{  
    display:flex;  
    gap:60px;  
}  

.footer {    
    background:#4aa3df;    
    color:#fff;    
    height:32px;    
    display:flex;    
    justify-content:space-between;    
    align-items:center;    
    padding:4px 10px;    
    font-size:9.5px;  
}    

.seguridad-vial{  
    display:flex;  
    align-items:center;  
    gap:6px;  
}  

.seguridad-vial .linea{  
    width:2px;  
    height:24px;  
    background:#fff;  
}  

.seguridad-vial .texto{  
    display:flex;  
    flex-direction:column;  
    font-weight:700;  
    font-size:12px;  
    line-height:1;  
}  

.footer-logo {    
    width:18px;    
}    

.footer-right{  
    display:flex;  
    align-items:center;  
    gap:5px;  
}    

</style>    
</head>    

<body>    

<button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>    
<button class="btn-pdf" style="top:45px;" onclick="generarImagen()">Descargar Imagen</button>

<div class="carnet-container" id="carnet">    

<div class="header">    
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Flag_of_Argentina.svg" class="flag-icon">    
    <div class="header-title">Licencia Nacional de Conducir<br>Buenos Aires - General San Martín</div>    
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Coat_of_arms_of_Argentina.svg" class="shield-icon">    
</div>    

<div class="content">    

    <div class="photo-placeholder" onclick="fileInput.click()">    
        <span id="txtFoto">Subir foto</span>    
        <img id="preview">    
    </div>    
    <input type="file" id="fileInput" hidden onchange="previewImage(this)">    

    <div class="data">    
        <div class="item"><div><span class="label">Licencia</span><b>12345678</b></div></div>  
        <div class="item"><div><span class="label">Apellido</span><b>RODRÍGUEZ</b></div></div>  
        <div class="item"><div><span class="label">Nombre</span><b>EMILIANO NICOLÁS</b></div></div>  
    </div>    

</div>    

<div class="footer">    
    <div class="seguridad-vial">
        <div class="linea"></div>
        <div class="texto">
            <span>SEGURIDAD</span>
            <span>VIAL</span>
        </div>
    </div>
</div>    

</div>    

<script>    

function previewImage(input){    
    const img = document.getElementById('preview');    
    const reader = new FileReader();    
    reader.onload = e=>{    
        img.src = e.target.result;    
        img.style.display="block";    
    }    
    reader.readAsDataURL(input.files[0]);    
}  

// 🖨️ MODO IMPRENTA REAL (300 DPI aprox)
async function generarPDF(){    

    const el = document.getElementById("carnet");

    const canvas = await html2canvas(el, {  
        scale: 3,   // 🔥 clave impresión (alta resolución)
        useCORS: true,
        backgroundColor: null
    });    

    const img = canvas.toDataURL("image/png", 1.0);    

    const pdf = new jsPDF({ 
        orientation:"landscape", 
        unit:"px", 
        format:[856,540] 
    });    

    pdf.addImage(img,"PNG",0,0,856,540);    
    pdf.save("carnet.pdf");    
}    

// 🖨️ IMAGEN IMPRESIÓN
async function generarImagen(){

    const el = document.getElementById("carnet");

    const canvas = await html2canvas(el, {  
        scale: 3,   // 🔥 300 DPI equivalente
        useCORS: true,
        backgroundColor: null
    });

    const link = document.createElement('a');
    link.download = 'carnet.jpg';
    link.href = canvas.toDataURL("image/jpeg", 1.0);
    link.click();
}

</script>    

</body>    
        </html>
