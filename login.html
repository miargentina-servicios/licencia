<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miBilletera | miArgentina</title>

<link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0072bb">

<style>
body{
margin:0;
font-family:'Encode Sans',sans-serif;
background:#f5f5f5;
overflow-x:hidden;
}

*{box-sizing:border-box;}

.navbar{
background:#fff;
border-bottom:3px solid #ffd100;
padding:10px 20px;
text-align:center;
}
.navbar img{height:60px;}

.header{
background:#0072bb;
color:#fff;
padding:10px 20px;
text-align:center;
font-weight:600;
position:relative;
min-height:44px;
}

.back-btn{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,.16);
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn:before{
content:"";
width:10px;
height:10px;
border-left:2px solid #fff;
border-bottom:2px solid #fff;
transform:rotate(45deg);
margin-left:4px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

/* TRANSICIÓN REAL */
.page{
position:absolute;
top:0;
left:0;
width:100%;
opacity:0;
transform:translateX(100%);
transition:transform .35s ease, opacity .35s ease;
display:none;
}

.page.active{
display:block;
opacity:1;
transform:translateX(0);
position:relative;
}

.page.exit{
display:block;
opacity:.6;
transform:translateX(-35%);
}

h1{font-size:22px;margin-bottom:10px;}
.subtitle{color:#666;font-size:14px;margin-bottom:20px;}

.card{
background:#fff;
border-radius:16px;
padding:16px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
margin-bottom:25px;
}

.card button{
margin-top:10px;
background:#0072bb;
color:#fff;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.item{
background:#e9ecf1;
border-radius:16px;
padding:14px 8px;
text-align:center;
font-size:13px;
color:#333;
font-weight:600;
}

.item .menu-icon{
font-size:24px;
display:block;
margin-bottom:8px;
line-height:1;
}

.icon svg{
width:28px;
height:28px;
stroke:#0072bb;
margin-bottom:8px;
display:block;
margin-left:auto;
margin-right:auto;
}

#login{
padding:30px;
min-height:calc(100vh - 90px);
display:flex;
flex-direction:column;
justify-content:space-between;
}

input{
width:100%;
max-width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:25px;
background:#0072bb;
color:#fff;
cursor:pointer;
width:100%;
font-weight:600;
}

.footer{
background:#f5f5f5;
padding:30px;
margin-top:40px;
text-align:center;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<script>
function cambiarPagina(idMostrar){

const actual=document.querySelector('.page.active');
const destino=document.getElementById(idMostrar);

if(actual===destino)return;

if(actual){
actual.classList.remove('active');
actual.classList.add('exit');

setTimeout(()=>{
actual.classList.remove('exit');
actual.style.display='none';
},350);
}

destino.style.display='block';

setTimeout(()=>{
destino.classList.add('active');
},20);
}

function abrirDocumentos(){
cambiarPagina("seccionDocumentos");
document.getElementById("backBtn").style.display="flex";
}

function volverHome(){
cambiarPagina("home");
document.getElementById("backBtn").style.display="none";
}

function mostrarLicencia(){
cambiarPagina("verLicencia");
document.getElementById("licNombre").innerText=usuarioActual.nombre;
document.getElementById("licApellido").innerText=usuarioActual.apellido;
document.getElementById("licDni").innerText=usuarioActual.dni;
document.getElementById("licVence").innerText=usuarioActual.vencimiento;
document.getElementById("qrImg").src=usuarioActual.qr;
}

function mostrarDni(){
cambiarPagina("verDni");

if(usuarioActual.dniDigital){
document.getElementById("dniImg").style.display="block";
document.getElementById("dniAviso").style.display="none";
document.getElementById("dniImg").src=usuarioActual.dniDigital;
}else{
document.getElementById("dniImg").style.display="none";
document.getElementById("dniAviso").style.display="block";
}
}

function mostrarAcademico(){
cambiarPagina("verAcademico");

const titulo=usuarioActual.tituloAcademico || "Título Académico";

document.getElementById("tituloAcademicoCard").innerText=titulo;
document.getElementById("tituloAcademicoVista").innerText=titulo;

if(usuarioActual.linkAnalitico && usuarioActual.linkTitulo){
document.getElementById("academicoDisponible").style.display="block";
document.getElementById("academicoNoDisponible").style.display="none";
}else{
document.getElementById("academicoDisponible").style.display="none";
document.getElementById("academicoNoDisponible").style.display="block";
}
}
</script>

</body>
</html>
