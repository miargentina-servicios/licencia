<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miBilletera | miArgentina</title>

<link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0072bb">

<style>
:root{
--primary:#0072bb;
--radius:16px;
--shadow:0 4px 12px rgba(0,0,0,.08);
--text:#222;
--muted:#6b7280;
}

body{
margin:0;
font-family:'Encode Sans',sans-serif;
background:linear-gradient(180deg,#f5f7fa,#eef2f6);
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;
}

*{box-sizing:border-box;}

.navbar{
background:#fff;
border-bottom:3px solid #ffd100;
padding:10px 20px;
text-align:center;
}

.navbar img{height:60px;}

.header{
background:var(--primary);
color:#fff;
padding:10px 20px;
text-align:center;
font-weight:600;
position:relative;
min-height:44px;
}

.back-btn{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,.16);
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn:before{
content:"";
width:10px;
height:10px;
border-left:2px solid #fff;
border-bottom:2px solid #fff;
transform:rotate(45deg);
margin-left:4px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:24px;
margin-bottom:10px;
font-weight:700;
color:var(--text);
}

h2{
font-size:18px;
font-weight:600;
color:var(--text);
}

.subtitle{
color:var(--muted);
font-size:14px;
line-height:1.4;
margin-bottom:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:var(--radius);
padding:16px;
display:flex;
align-items:center;
gap:15px;
box-shadow:var(--shadow);
margin-bottom:25px;
transition:.2s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

.card button{
margin-top:10px;
background:var(--primary);
color:#fff;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.item{
background:#e9ecf1;
border-radius:18px;
padding:18px 10px;
text-align:center;
font-size:13px;
font-weight:600;
transition:.15s;
}

.item .menu-icon{
font-size:24px;
display:block;
margin-bottom:8px;
}

.item:active{
transform:scale(.97);
}

/* BOTONES */
button{
padding:10px;
border:none;
border-radius:25px;
background:var(--primary);
color:#fff;
cursor:pointer;
width:100%;
font-weight:600;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.footer{
padding:30px;
text-align:center;
font-size:13px;
color:#666;
}

/* LOADER */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;height:40px;
border:4px solid #ccc;
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* DOCUMENTOS */
#seccionDocumentos,
#verLicencia,
#verDni{display:none;}

.doc-card{
background:#fff;
border-radius:var(--radius);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
box-shadow:var(--shadow);
cursor:pointer;
transition:.2s;
}

.doc-card:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

.doc-left{
display:flex;
align-items:center;
gap:14px;
font-weight:700;
font-size:18px;
}

.doc-arrow{font-size:24px;color:#777;}

/* LICENCIA */
.licencia-box{
background:#fff;
border-radius:18px;
box-shadow:var(--shadow);
max-width:420px;
margin:0 auto;
overflow:hidden;
}

.licencia-top{
padding:18px;
font-size:24px;
font-weight:700;
border-bottom:1px solid #eee;
}

.licencia-alerta{
padding:18px;
font-size:14px;
background:#fafafa;
border-bottom:1px solid #eee;
}

.qr-box{
height:220px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #eee;
}

.qr-box img{
width:85%;
height:85%;
object-fit:contain;
}

.licencia-datos{
padding:18px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.campo small{color:#777;font-size:12px;}
.campo strong{font-size:16px;}

.full{grid-column:1/3;}

.estado-ok{color:#18a44c;font-weight:700;}

.btn-licencia{
margin:18px;
width:calc(100% - 36px);
background:#3b33cc;
}

/* MODAL */
#modoLicencia{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

</style>
</head>

<body>

<div class="navbar">
<img src="https://i.postimg.cc/638qB6NY/1776094869296.png">
</div>

<div id="loader">
<div style="font-size:22px;color:#0072bb;font-weight:600;">miBilletera</div>
<div class="spinner"></div>
<div style="margin-top:10px;font-size:14px;">Cargando sistema...</div>
</div>

<div id="login" style="display:none;">
<div class="header">Ingresar</div>

<input id="email" placeholder="Correo">
<input id="dni" placeholder="DNI">

<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<div class="header">
<span class="back-btn" id="backBtn" onclick="volverHome()"></span>
</div>

<div class="container" id="home">

<h1 id="saludo">¡Hola!</h1>
<div class="subtitle">Gestioná trámites y documentos digitales.</div>

<div class="card">
<div>No tenés turnos programados</div>
<button>Sacar turno</button>
</div>

<h2>¿Qué necesitás hoy?</h2>

<div class="grid">
<div class="item" onclick="abrirDocumentos()"><span class="menu-icon">🪪</span>Documentos</div>
<div class="item"><span class="menu-icon">🚘</span>Vehículos</div>
<div class="item"><span class="menu-icon">💼</span>Trabajo</div>
</div>

</div>

<div class="container" id="seccionDocumentos">

<div class="doc-card" onclick="mostrarDni()">
<div class="doc-left">🪪 DNI</div>
<div class="doc-arrow">⌄</div>
</div>

<div class="doc-card" onclick="mostrarLicencia()">
<div class="doc-left">🚘 Licencia</div>
<div class="doc-arrow">⌄</div>
</div>

</div>

<div class="container" id="verLicencia">

<div class="licencia-box">

<div class="licencia-top">Licencia Nacional de Conducir</div>

<div class="licencia-alerta">
Documento digital oficial.
</div>

<div class="qr-box">
<img id="qrImg">
</div>

<div class="licencia-datos">
<div class="campo"><small>Nombre</small><strong id="licNombre"></strong></div>
<div class="campo"><small>Apellido</small><strong id="licApellido"></strong></div>
<div class="campo full"><small>DNI</small><strong id="licDni"></strong></div>
<div class="campo"><small>Estado</small><strong class="estado-ok">Vigente</strong></div>
<div class="campo"><small>Vencimiento</small><strong id="licVence"></strong></div>
</div>

<button class="btn-licencia" onclick="abrirModoLicencia()">Ver mi licencia</button>

</div>

</div>

</div>

<script>
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("login").style.display="block";
},1500);

const usuarios=[{email:"usuario@gmail.com",dni:"12345678",nombre:"Emiliano Nicolás",apellido:"Rodríguez",vencimiento:"25/03/2031",frente:"",dorso:"",qr:"https://i.postimg.cc/RZL3SMKW/April16-014726PM.png"}];

let usuarioActual=null;

function login(){
const email=document.getElementById("email").value;
const dni=document.getElementById("dni").value;

const user=usuarios.find(u=>u.email===email && u.dni===dni);

if(user){
usuarioActual=user;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("saludo").innerText="¡Hola "+user.nombre+"!";
}else{
alert("Datos incorrectos");
}
}

function abrirDocumentos(){
document.getElementById("home").style.display="none";
document.getElementById("seccionDocumentos").style.display="block";
}

function volverHome(){
location.reload();
}

function mostrarLicencia(){
document.getElementById("seccionDocumentos").style.display="none";
document.getElementById("verLicencia").style.display="block";

document.getElementById("licNombre").innerText=usuarioActual.nombre;
document.getElementById("licApellido").innerText=usuarioActual.apellido;
document.getElementById("licDni").innerText=usuarioActual.dni;
document.getElementById("licVence").innerText=usuarioActual.vencimiento;
document.getElementById("qrImg").src=usuarioActual.qr;
}
</script>

</body>
  </html>
