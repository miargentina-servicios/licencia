<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miBilletera | miArgentina</title>

<link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0072bb">

<style>
:root{
--primary:#0072bb;
--radius:16px;
--shadow:0 4px 12px rgba(0,0,0,.08);
--text:#222;
--muted:#6b7280;
--bg:#f5f7fa;
}

body{
margin:0;
font-family:'Encode Sans',sans-serif;
background:linear-gradient(180deg,#f5f7fa,#eef2f6);
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;
}

*{box-sizing:border-box;}

.navbar{
background:#fff;
border-bottom:3px solid #ffd100;
padding:10px 20px;
text-align:center;
}

.navbar img{height:60px;}

.header{
background:var(--primary);
color:#fff;
padding:10px 20px;
text-align:center;
font-weight:600;
position:relative;
min-height:44px;
backdrop-filter:blur(10px);
}

.back-btn{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,.16);
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}

.back-btn:before{
content:"";
width:10px;
height:10px;
border-left:2px solid #fff;
border-bottom:2px solid #fff;
transform:rotate(45deg);
margin-left:4px;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

/* 1. Jerarquía tipográfica */
h1{
font-size:24px;
margin-bottom:10px;
font-weight:700;
color:var(--text);
}

h2{
font-size:18px;
font-weight:600;
color:var(--text);
}

.subtitle{
color:var(--muted);
font-size:14px;
line-height:1.4;
margin-bottom:20px;
}

/* 2. Sistema visual consistente */
.card{
background:#fff;
border-radius:var(--radius);
padding:16px;
display:flex;
align-items:center;
gap:15px;
box-shadow:var(--shadow);
margin-bottom:25px;
transition:.2s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

.card button{
margin-top:10px;
background:var(--primary);
color:#fff;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-size:13px;
transition:.15s;
}

.card button:active{
transform:scale(.98);
}

/* GRID mejorado */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.item{
background:#e9ecf1;
border-radius:18px;
padding:18px 10px;
text-align:center;
font-size:13px;
color:#333;
font-weight:600;
transition:.15s ease;
}

.item .menu-icon{
font-size:24px;
display:block;
margin-bottom:8px;
line-height:1;
}

.item:active{
transform:scale(.97);
background:#dfe6ee;
}

/* icon */
.icon svg{
width:28px;
height:28px;
stroke:var(--primary);
margin-bottom:8px;
display:block;
margin-left:auto;
margin-right:auto;
}

/* botones globales */
button{
padding:10px;
border:none;
border-radius:25px;
background:var(--primary);
color:#fff;
cursor:pointer;
width:100%;
font-weight:600;
transition:.15s;
}

button:active{
transform:scale(.98);
}

input{
width:100%;
max-width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.footer{
background:#f5f5f5;
padding:30px;
margin-top:40px;
text-align:center;
font-size:13px;
color:#666;
}

/* loader */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#fff;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;height:40px;
border:4px solid #ccc;
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
margin-top:15px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* resto sin cambios */
#seccionDocumentos,
#verLicencia,
#verDni{display:none;}

.doc-card{
background:#fff;
border-radius:var(--radius);
padding:18px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
box-shadow:var(--shadow);
cursor:pointer;
transition:.2s ease;
}

.doc-card:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,.12);
}

.doc-left{
display:flex;
align-items:center;
gap:14px;
font-weight:700;
font-size:20px;
}

.doc-icon svg{
width:34px;
height:34px;
stroke:#4433cc;
fill:none;
stroke-width:1.8;
}

.doc-arrow{
font-size:28px;
color:#777;
}

.card-container{
perspective:1000px;
width:96vw;
max-width:980px;
height:58vw;
max-height:560px;
margin:10px auto;
display:none;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.is-flipped{transform:rotateY(180deg);}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:8px;
overflow:hidden;
}

.card-back{transform:rotateY(180deg);}

.card-img{
width:100%;
height:100%;
object-fit:contain;
background:#111;
}

#dniImg{
width:100%;
max-width:380px;
display:block;
margin:20px auto;
border-radius:15px;
box-shadow:0 2px 6px rgba(0,0,0,.15);
}

.no-dni{
background:#fff;
border-radius:18px;
padding:28px 20px;
text-align:center;
font-weight:700;
color:#555;
font-size:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
border:1px solid #ececec;
margin-top:20px;
}

.licencia-box{
background:#fff;
border-radius:18px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
overflow:hidden;
max-width:420px;
margin:0 auto;
}

.licencia-top{
padding:18px;
font-size:28px;
font-weight:700;
color:#333;
border-bottom:1px solid #eee;
}

.licencia-alerta{
padding:18px;
font-size:15px;
line-height:1.4;
color:#444;
border-bottom:1px solid #eee;
background:#fafafa;
}

.qr-box{
height:220px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #eee;
}

.qr-box img{
width:85%;
height:85%;
object-fit:contain;
padding:10px;
}

.licencia-datos{
padding:18px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.campo small{
display:block;
color:#777;
font-size:12px;
margin-bottom:4px;
}

.campo strong{
font-size:18px;
color:#222;
}

.full{grid-column:1/3;}

.estado-ok{
color:#18a44c;
font-weight:700;
}

.btn-licencia{
margin:18px;
width:calc(100% - 36px);
background:#3b33cc;
}

.info-extra{
padding:20px;
border-top:1px solid #eee;
font-size:14px;
line-height:1.5;
color:#444;
}

.info-extra strong{
display:block;
margin-bottom:6px;
color:#333;
}

.info-extra span{
color:#78a6d7;
font-weight:700;
}

/* modo licencia sin cambios */
#modoLicencia{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
z-index:99999;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

.salir-licencia{
position:absolute;
top:15px;
left:15px;
width:42px;
height:42px;
border-radius:50%;
background:rgba(255,255,255,.14);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.salir-licencia:before{
content:"";
width:12px;
height:12px;
border-left:3px solid #fff;
border-bottom:3px solid #fff;
transform:rotate(45deg);
margin-left:4px;
}

.girar-btn{
margin-top:18px;
width:220px;
background:#3b33cc;
}
</style>
</head>
